name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  publish:
    name: Publish ${{ matrix.rid }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { rid: win-x64,     os: windows-latest }
          - { rid: win-arm64,   os: windows-latest }
          - { rid: osx-x64,     os: macos-latest }
          - { rid: osx-arm64,   os: macos-latest }
          - { rid: linux-x64,   os: ubuntu-latest }
          # Cross-compiled from x64: point ILC's symbol-stripping step at the cross objcopy,
          # otherwise the host (x86_64) objcopy can't read the arm64 ELF it just linked.
          - { rid: linux-arm64, os: ubuntu-latest, publishArgs: '-p:ObjCopyName=aarch64-linux-gnu-objcopy' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Native AOT on Linux needs clang/zlib; cross-compiling to arm64 needs the cross toolchain.
      - name: Install AOT prerequisites (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev
          if [ "${{ matrix.rid }}" = "linux-arm64" ]; then
            sudo apt-get install -y binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu
          fi

      - name: Publish (Native AOT)
        run: dotnet publish src/Cleaner.Cli -r ${{ matrix.rid }} -c Release -o publish/${{ matrix.rid }} ${{ matrix.publishArgs }}

      - name: Package
        shell: bash
        run: |
          name="cleaner-${GITHUB_REF_NAME}-${{ matrix.rid }}"
          cd publish/${{ matrix.rid }}
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            7z a "../../${name}.zip" cleaner.exe
          else
            tar -czf "../../${name}.tar.gz" cleaner
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: cleaner-${{ matrix.rid }}
          path: cleaner-*.*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: dist/*
